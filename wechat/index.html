<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天记录(网页端)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #444;
            font-size: 24px;
            margin-bottom: 10px;
        }
        ul {
            padding: 0;
        }
        li {
            list-style-type: none;
            margin-bottom: 10px;
        }
        a {
            text-decoration: none;
            color: #007BFF;
            font-size: 16px;
        }
        details {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 20px;
        }
        summary {
            font-weight: bold;
            cursor: pointer;
            color: #333;
            font-size: 18px;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: calc(100% * 1920 / 1280);
            border: 2px solid #333;
            border-radius: 5px;
        }
        iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            border: none;
        }
    </style>
</head>
<body>
    <h1>大号</h1>
    <ul>
        <li>
            <a href="./Someone_I_love/index.html">直接跳转大号聊天记录</a>
        </li>
    </ul>
    <details>
        <summary>展开大号聊天记录</summary>
        <div class="iframe-container">
            <iframe src="./Someone_I_love/index.html" title="大号聊天记录"></iframe>
        </div>
    </details>

    <h1>小号</h1>
    <ul>
        <li>
            <a href="./My_everything/index.html">直接跳转小号聊天记录</a>
        </li>
    </ul>
    <details>
        <summary>展开小号聊天记录</summary>
        <div class="iframe-container">
            <iframe src="./My_everything/index.html" title="小号聊天记录"></iframe>
        </div>
    </details>   
</body>
</html>
